trigger:
- main

pool:
  vmImage: self-hosted-terraform-pool

variables:
  terraformVersion: '1.8.5'

stages:

- stage: TerraformValidate
  jobs:
  - job: TerraformValidateJob
    steps:

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(terraformVersion)

    - task: TerraformTaskV4@4
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'
        backendServiceArm: 'azure-service-conn'
        backendAzureRmResourceGroupName: 'tf-backend-rg'
        backendAzureRmStorageAccountName: 'tfbackendstorage12345'   # ✅ FIXED
        backendAzureRmContainerName: 'tfstate'
        backendAzureRmKey: 'terraform.tfstate'

    - task: TerraformTaskV4@4
      displayName: Terraform Validate
      inputs:
        provider: 'azurerm'
        command: 'validate'

    - task: TerraformTaskV4@4
      displayName: Terraform Plan
      inputs:
        provider: 'azurerm'
        command: 'plan'
        environmentServiceNameAzureRM: 'azure-service-conn'

- stage: TerraformApply
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - deployment: TerraformApplyJob
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:

          - task: TerraformTaskV4@4
            displayName: Terraform Apply
            inputs:
              provider: 'azurerm'
              command: 'apply'
              environmentServiceNameAzureRM: 'azure-service-conn'