trigger:
- main

pool:
  name: Default

variables:
  terraformVersion: '1.8.5'

stages:

# -------------------------------
# VALIDATE + PLAN
# -------------------------------
- stage: TerraformValidate
  displayName: "Terraform Validate Stage"

  jobs:
  - job: Validate
    steps:

    - checkout: self
      fetchDepth: 1

    - script: |
        echo "Installing Terraform (if not installed)"
        if ! command -v terraform &> /dev/null; then
          sudo apt-get update -y
          sudo apt-get install -y wget unzip
          wget https://releases.hashicorp.com/terraform/$(terraformVersion)/terraform_$(terraformVersion)_linux_amd64.zip
          unzip terraform_$(terraformVersion)_linux_amd64.zip
          sudo mv terraform /usr/local/bin/
        fi
      displayName: "Install Terraform"

    - script: terraform version
      displayName: "Terraform Version Check"

    # 🔐 Authenticated Terraform execution
    - task: AzureCLI@2
      displayName: "Terraform Init, Validate & Plan"
      inputs:
        azureSubscription: 'azure-service-conn'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          terraform init \
            -backend-config="resource_group_name=tf-backend-rg" \
            -backend-config="storage_account_name=tfbackendstorage12345" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=terraform.tfstate"

          terraform validate

          terraform plan -out=tfplan

    # 📦 Publish tfplan artifact
    - task: PublishBuildArtifacts@1
      inputs:
        pathToPublish: 'tfplan'
        artifactName: 'tfplan'
      displayName: "Publish Terraform Plan"

# -------------------------------
# APPLY
# -------------------------------
- stage: TerraformApply
  displayName: "Terraform Apply Stage"
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))

  jobs:
  - job: Apply
    steps:

    - checkout: self

    # 📥 Download tfplan artifact
    - task: DownloadBuildArtifacts@0
      inputs:
        buildType: 'current'
        downloadType: 'single'
        artifactName: 'tfplan'
        downloadPath: '$(Pipeline.Workspace)'
      displayName: "Download Terraform Plan"

    # 🔐 Authenticated Apply
    - task: AzureCLI@2
      displayName: "Terraform Apply"
      inputs:
        azureSubscription: 'azure-service-conn'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          terraform init \
            -backend-config="resource_group_name=tf-backend-rg" \
            -backend-config="storage_account_name=tfbackendstorage12345" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=terraform.tfstate"

          terraform apply -auto-approve $(Pipeline.Workspace)/tfplan/tfplan