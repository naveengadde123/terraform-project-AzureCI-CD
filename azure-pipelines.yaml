trigger:
- main

pool:
  name: Default

variables:
  terraformVersion: '1.8.5'

stages:

- stage: TerraformValidate
  displayName: "Terraform Validate Stage"
  jobs:
  - job: Validate
    steps:

    - checkout: self
      fetchDepth: 1

    - script: |
        echo "Installing Terraform (if not installed)"
        if ! command -v terraform &> /dev/null; then
          sudo apt-get update -y
          sudo apt-get install -y wget unzip
          wget https://releases.hashicorp.com/terraform/$(terraformVersion)/terraform_$(terraformVersion)_linux_amd64.zip
          unzip terraform_$(terraformVersion)_linux_amd64.zip
          sudo mv terraform /usr/local/bin/
        fi

      displayName: "Install Terraform"

    - script: |
        terraform version
      displayName: "Terraform Version Check"

    - task: AzureCLI@2
      inputs:
        azureSubscription: 'Azure_Service_Connection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          echo "Azure CLI authenticated"
          az account show
      displayName: "Azure Login"

    - task: AzureCLI@2
      inputs:
        azureSubscription: 'Azure_Service_Connection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          terraform init \
            -backend-config="resource_group_name=tf-backend-rg" \
            -backend-config="storage_account_name=tfbackendstorage12345" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=terraform.tfstate"
      displayName: "Terraform Init"

    - task: AzureCLI@2
      inputs:
        azureSubscription: 'Azure_Service_Connection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          terraform validate
      displayName: "Terraform Validate"

    - task: AzureCLI@2
      inputs:
        azureSubscription: 'Azure_Service_Connection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          terraform plan -out=tfplan
      displayName: "Terraform Plan"

- stage: TerraformApply
  displayName: "Terraform Apply Stage"
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))

  jobs:
  - job: Apply
    steps:

    - checkout: self
      fetchDepth: 1

    - task: AzureCLI@2
      inputs:
        azureSubscription: 'Azure_Service_Connection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          terraform apply -auto-approve tfplan
      displayName: "Terraform Apply"